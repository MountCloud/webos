<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例 05 - jQuery + UMD</title>

  <!-- jQuery（演示老项目场景） -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

  <!-- webos SDK 的 UMD 包 -->
  <script src="../../packages/host-sdk/dist/host-sdk.umd.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #fdf6e3;
      color: #1a202c;
      line-height: 1.6;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .subtitle { color: #856404; font-size: 13px; margin-bottom: 20px; font-style: italic; }
    .card {
      background: #fffef5;
      border: 1px solid #f6e05e;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 12px; font-size: 14px; color: #744210; }
    button {
      padding: 8px 14px;
      margin: 4px 6px 4px 0;
      background: #d69e2e;
      color: #1a202c;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover { background: #b7791f; color: #fff; }
    button.danger { background: #c53030; color: #fff; }
    button.danger:hover { background: #9b2c2c; }
    pre {
      background: #1a202c;
      color: #f6e05e;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
      margin: 0;
      font-family: "Consolas", "Monaco", monospace;
    }
  </style>
</head>
<body>
  <h1>🦄 jQuery + UMD 示例</h1>
  <p class="subtitle">老项目场景：保留 jQuery，把 webos SDK 当 UMD 一起引，无侵入接入。</p>

  <div class="card">
    <h2>常用能力</h2>
    <button data-act="notify">弹通知</button>
    <button data-act="alert">Alert</button>
    <button data-act="confirm">Confirm</button>
    <button data-act="prompt">Prompt</button>
    <button data-act="setTitle">改窗口标题</button>
    <button data-act="apps">列出应用</button>
    <button data-act="info">读 system.info</button>
    <button data-act="theme">切换主题</button>
    <button class="danger" data-act="close">关闭自己</button>
  </div>

  <div class="card">
    <h2>调用日志</h2>
    <pre id="log">[等待操作]</pre>
  </div>

  <script>
    // jQuery 与 webos.UMD 共存示范
    (function ($, webos) {
      function log(msg) {
        var t = '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
        var $log = $('#log');
        $log.text(t + $log.text());
      }

      var actions = {
        notify: function () {
          webos.notify({ title: '来自 jQuery', message: 'UMD 包工作正常', level: 'info' });
          log('已弹通知');
        },
        alert: function () {
          return webos.dialog.alert('jQuery 老项目接入示例', '提示').then(function () {
            log('alert 已关闭');
          });
        },
        confirm: function () {
          return webos.dialog.confirm('继续？').then(function (r) { log('confirm: ' + r); });
        },
        prompt: function () {
          return webos.dialog.prompt('输入', 'jQuery').then(function (r) {
            log('prompt: ' + (r === null ? '(取消)' : r));
          });
        },
        setTitle: function () {
          var t = 'jQuery · ' + new Date().toLocaleTimeString();
          return webos.window.setTitle(t).then(function () { log('setTitle: ' + t); });
        },
        apps: function () {
          return webos.apps.list().then(function (list) {
            log('apps: ' + $.map(list, function (a) { return a.appId; }).join(', '));
          });
        },
        info: function () {
          return webos.system.info().then(function (info) {
            log('system.info: ' + JSON.stringify(info));
          });
        },
        theme: function () {
          return webos.theme.current().then(function (t) {
            return webos.theme.set(t === 'dark' ? 'light' : 'dark');
          }).then(function () { log('已切换主题'); });
        },
        close: function () { webos.window.close(); }
      };

      $(function () {
        $('button[data-act]').on('click', function () {
          var key = $(this).data('act');
          var fn = actions[key];
          if (fn) {
            try {
              var r = fn();
              if (r && typeof r.catch === 'function') {
                r.catch(function (err) { log('错误: ' + (err && err.message || err)); });
              }
            } catch (err) {
              log('错误: ' + (err && err.message || err));
            }
          }
        });

        webos.theme.on('change', function (theme) { log('主题变更: ' + theme); });
        log('jQuery ' + $.fn.jquery + ' + webos SDK 已就绪');
      });
    })(window.jQuery, window.Webos);
  </script>
</body>
</html>
