<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例 02 - Vanilla JS + Vite</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <main id="app">
    <h1>📦 Vanilla JS + Vite 示例</h1>
    <p class="subtitle">用 Vite 打包 + ESM 导入 SDK，零框架。</p>

    <div class="card">
      <h2>常用能力</h2>
      <button data-action="notify">弹通知</button>
      <button data-action="alert">Alert</button>
      <button data-action="confirm">Confirm</button>
      <button data-action="prompt">Prompt</button>
      <button data-action="setTitle">改窗口标题</button>
      <button data-action="info">读 system.info</button>
      <button data-action="apps">列出应用</button>
      <button data-action="toggle-theme">切换主题</button>
      <button class="danger" data-action="close">关闭自己</button>
    </div>

    <div class="card">
      <h2>调用日志</h2>
      <pre id="log">[等待操作]</pre>
    </div>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
